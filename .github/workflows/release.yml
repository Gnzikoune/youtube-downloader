name: Automated Release

on:
  push:
    branches:
      - main # Le robot travaille à chaque push sur main

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Important pour que semantic-release puisse lire l'historique

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Renderer
        run: npm run build:renderer

      - name: Semantic Release & Build Electron
        # On ne lance semantic-release qu'une seule fois (sur Windows par exemple)
        # pour déterminer la version, puis on build sur tous les OS.
        run: |
          npx semantic-release --dry-run > release_info.txt || true
          npm run build:electron
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Si vous utilisez un token personnel, mettez-le ici
